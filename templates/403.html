<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>403 Forbidden | Fake News Detection System</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}" />
  <script>
    const savedTheme = localStorage.getItem('theme') || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
    if (savedTheme === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
  </script>
</head>
<body style="display:flex; align-items:center; justify-content:center; min-height:100vh; background:var(--bg-color);">
  <div style="text-align:center; padding:2rem;">
    <div style="font-size:4rem; margin-bottom:1rem;">🔒</div>
    <h1 style="font-size:1.5rem; color:var(--text-primary); margin-bottom:0.5rem;">Access Denied</h1>
    <p style="color:var(--text-secondary); margin-bottom:1.5rem;">You don't have permission to view this page.</p>
    <a href="{{ url_for('main.index') }}" class="btn btn--primary" style="display:inline-flex; width:auto; padding:0.65rem 1.5rem;">
      Back to Home
    </a>
  </div>

  <script>
    function toggleTheme() {
      const current = document.documentElement.getAttribute('data-theme');
      const next = current === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', next);
      localStorage.setItem('theme', next);
    }
  </script>
</body>
</html>
